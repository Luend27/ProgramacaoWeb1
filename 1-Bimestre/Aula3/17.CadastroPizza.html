<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro Pizza Online</title>
</head>

<body>

    <table align="center" width="80%" style="font-family: Arial; color: #902622;" border="1">

        <tr>
            <td>
                <img src="/Atividades-com-Imagens/imagens_pizza (3)/imagens_pizza/topo.png" width="100%" height="40">
            </td>
        </tr>

        <tr>
            <td style="padding: 15px; border-bottom: 2px solid;">
                <img src="/Atividades-com-Imagens/imagens_pizza (3)/imagens_pizza/icone_pizza.gif" align="middle">
                <b>Cadastre-se e receba nossas atualizações</b>
            </td>
        </tr>

        <tr>
            <td align="center" style="padding: 20px;">

                <table width="70%" border="1" cellspacing="0" cellpadding="5" border="1">

                    <tr>
                        <td align="right" width="40%" style="color: #902622;">Nome:</td>
                        <td><input type="text" size="30"></td>
                    </tr>

                    <tr>
                        <td align="right" style="color: #902622;">Senha:</td>
                        <td><input type="password" size="30"></td>
                    </tr>

                    <tr>
                        <td align="right" style="color: #902622;">Confirmação de senha:</td>
                        <td><input type="password" size="30"></td>
                    </tr>

                    <tr>
                        <td align="right" style="color: #902622;">Seu tipo de Pizza preferido:</td>
                        <td>
                            <select>
                                <option>Margherita</option>
                                <option>Mussarela</option>
                                <option>Calabresa</option>
                                <option>Quatro Queijos</option>
                                <option>Pepperoni</option>
                                <option>Califórnia</option>
                                <option>Bacon</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td align="right" style="color: #902622;">Quantas vezes come Pizza por semestre?</td>
                        <td>
                            <input type="radio" name="freq"> Entre 1 a 5<br>
                            <input type="radio" name="freq"> 5 a 10<br>
                            <input type="radio" name="freq"> Mais de 10
                        </td>
                    </tr>

                    <tr>
                        <td align="right" style="color: #902622;">Comentário:</td>
                        <td>
                            <textarea rows="4" cols="30"></textarea>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2" align="center">
                            <input type="checkbox" checked>
                            Deseja receber e-mails dos nossos parceiros
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2" align="center">
                            <input type="submit" value="Enviar">
                            <input type="reset" value="Limpar">
                        </td>
                    </tr>
                </table>
                <hr color="red" style="height: 1px;">

            </td>
        </tr>

        <tr>
            <td align="center" style="color: #902622;">
                w w w . p i z z a o n l i n e . c o m . b r
            </td>
        </tr>

        <tr>
            <td>
                <img src="/Atividades-com-Imagens/imagens_pizza (3)/imagens_pizza/topo.png" width="100%" height="40">
            </td>
        </tr>

    </table>

</body>

</html>
