<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exame de vista</title>
    
    <style>
        h1, h2, h3, h4, h5, h6 {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        h3 {
            color: green;
        }
        h4 {
            color: gray;
        }
        h5 {
            color: red;
        }
        h6 {
            color: blue;
        }
    </style>
</head>
<body>
    
    <h1>Exame de vista</h1>
    
    <hr>
    
    <h2>Leia apenas o que se pede:</h2>
    
    <h3>números : a 2 3 u 5 j 8</h3>
    
    <h4>letras : y a 1 2 / 3 q</h4>
    
    <h5>vogais : 1 a + o p 3 i</h5>
    
    <h6>consoantes : c a 8 o # d i</h6>

</body>
</html>
