<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morango</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/embed.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        .promo-banner {
            background-color: #e53935;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .bg-text {
            font-size: 13vw;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -2px;
            user-select: none;
            z-index: 1;
        }

        .product-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            height: 500px;
        }

        .can-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            max-height: 450px;
            width: auto;
        }

        .strawberries-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
            object-fit: cover;
        }

        .carousel-btn {
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="promo-banner d-flex align-items-center justify-content-center">
        
        <button class="carousel-control-prev carousel-btn position-absolute start-3" type="button">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>

        <div class="container position-relative d-flex align-items-center justify-content-center text-center">
            
            <h1 class="bg-text position-absolute m-0 text-uppercase">Morango</h1>

            <div class="product-wrapper d-flex align-items-center justify-content-center">
                
                <img src="/Atividades-com-Imagens/Morango-refrigerante (2).png" alt="Morango Drink Lata" class="can-img img-fluid">
                
                <img src="/Atividades-com-Imagens/Morango-refrigerante-foregroundBlur (3).png" alt="Morangos Voando" class="strawberries-overlay">
                
            </div>

        </div>

        <button class="carousel-control-next carousel-btn position-absolute end-3" type="button">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Próximo</span>
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
