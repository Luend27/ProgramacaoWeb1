<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Demonstração de Listas</title>
    <link rel="stylesheet" href="/2-Bimestre/5-lista.css">
</head>
<body>

    <h2>Demonstração do uso de listas com HTML e CSS</h2>
    <hr>

    <p>Listas não ordenadas:</p>

    <ul class="quadrado">
        <li>ICC</li>
        <li>IPW</li>
        <li>SO</li>
    </ul>

    <ul class="circulo-oco">
        <li>ICC</li>
        <li>IPW</li>
        <li>SO</li>
    </ul>

    <ul class="disco">
        <li>ICC</li>
        <li>IPW</li>
        <li>SO</li>
    </ul>

    <ul class="imagem">
        <li>ICC</li>
        <li>IPW</li>
        <li>SO</li>
    </ul>

    <p>Listas ordenadas:</p>

    <ol class="numeros">
        <li>ICC</li>
        <li>IPW</li>
        <li>SO</li>
    </ol>

    <ol class="romano">
        <li>ICC</li>
        <li>IPW</li>
        <li>SO</li>
    </ol>

    <ol class="minuscula">
        <li>ICC</li>
        <li>IPW</li>
        <li>SO</li>
    </ol>

</body>
</html>
