<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos</title>
    <link rel="stylesheet" href="/2-Bimestre/9-profile.css">
</head>
<body>

    <div class="cards-container">
        
        <div class="card">
            <img src="/2-Bimestre/9-imagens/imagem01.png" alt="Lógica 101">
            <div class="card-body">
                <div class="card-number">1</div>
                <div class="card-content">
                    <a href="#" class="card-title">Lógica 101</a>
                    <div class="card-time"><span class="clock-icon"></span> 103 min</div>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="/2-Bimestre/9-imagens/imagem02.png" alt="Criando uma máquina virtual Ubuntu">
            <div class="card-body">
                <div class="card-number">2</div>
                <div class="card-content">
                    <a href="#" class="card-title">Criando uma máquina virtual Ubuntu</a>
                    <div class="card-time"><span class="clock-icon"></span> 57 min</div>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="/2-Bimestre/9-imagens/imagem03.png" alt="Ubuntu 101">
            <div class="card-body">
                <div class="card-number">3</div>
                <div class="card-content">
                    <a href="#" class="card-title">Ubuntu 101</a>
                    <div class="card-time"><span class="clock-icon"></span> 139 min</div>
                </div>
            </div>
        </div>

        <div class="card">
            <img src="/2-Bimestre/9-imagens/imagem04.png" alt="Python 101">
            <div class="card-body">
                <div class="card-number">4</div>
                <div class="card-content">
                    <a href="#" class="card-title">Python 101</a>
                    <div class="card-time"><span class="clock-icon"></span> 565 min</div>
                </div>
            </div>
        </div>

    </div>

    <div class="profile-section">
        <div class="avatar-container">
            <img src="/2-Bimestre/9-imagens/user.png" alt="Foto de Perfil" class="avatar">
        </div>
        
        <p class="profile-greeting">Olá, <strong>Assinante</strong></p>
        <p class="profile-role">Assinante</p>
        
        <hr class="divisor">
        
        <p class="feed-vazio">Você não tem nada no Feed.</p>
    </div>

</body>
</html>
