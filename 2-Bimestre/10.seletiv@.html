<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .bg-custom-green {
            background-color: #11815b !important;
        }

        .text-custom-green {
            color: #11815b !important;
        }

        .btn-custom-green {
            background-color: #11815b;
            color: white;
        }

        .btn-custom-green:hover {
            background-color: #0d6849;
            color: white;
        }

        body {
            background-color: #e9ecef;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark bg-custom-green">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1 fw-bold">SELETIV@</span>
        </div>
    </nav>

    <div class="container mt-5 mb-5 d-flex justify-content-center">

        <div class="card shadow-sm" style="width: 100%; max-width: 650px;">
            <div class="card-body p-4 p-md-5">

                <h4 class="text-custom-green mb-3">Nova empresa</h4>
                <hr class="mb-4">

                <form>
                    <div class="row g-3">

                        <div class="col-md-6">
                            <label for="inputNome" class="form-label">Nome:</label>
                            <input type="text" class="form-control" id="inputNome" placeholder="Digite seu nome...">
                        </div>

                        <div class="col-md-6">
                            <label for="inputEmail" class="form-label">E-mail:</label>
                            <input type="email" class="form-control" id="inputEmail" placeholder="email@gmail.com">
                        </div>

                        <div class="col-md-6">
                            <label for="inputCidade" class="form-label">Cidade:</label>
                            <input type="text" class="form-control" id="inputCidade"
                                placeholder="Digite a cidade da empresa...">
                        </div>

                        <div class="col-md-6">
                            <label for="inputEndereco" class="form-label">Endereço:</label>
                            <input type="text" class="form-control" id="inputEndereco" placeholder="Rua...">
                        </div>

                        <div class="col-12">
                            <label for="inputNicho" class="form-label">Nicho de mercado:</label>
                            <input type="text" class="form-control" id="inputNicho" value="Marketing">
                        </div>

                        <div class="col-12">
                            <label for="inputTecnologias" class="form-label">Tecnologias usadas:</label>
                            <textarea class="form-control" id="inputTecnologias" rows="3"></textarea>
                        </div>

                        <div class="col-12">
                            <label for="inputCaracteristicas" class="form-label">Característica da empresa:</label>
                            <textarea class="form-control" id="inputCaracteristicas" rows="3"></textarea>
                        </div>

                        <div class="col-12">
                            <label for="inputLogo" class="form-label">Logo:</label>
                            <input class="form-control" type="file" id="inputLogo">
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-custom-green px-4">Nova empresa</button>
                        </div>

                    </div>
                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
