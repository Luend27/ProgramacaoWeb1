<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Formulário Opera</title>
</head>

<body>

    <table width="100%" border="0">
        <tr>
            <td align="center">

                <form id="formulario">
                    <fieldset style="width: 650px;">

                        <table width="100%" border="0">
                            <tr>

                                <td width="75%">
                                    <table border="0" cellpadding="4">
                                        <tr>
                                            <td align="right">
                                                <font color="#666666" face="Arial">Name (required)</font>
                                            </td>
                                            <td>
                                                <input type="text" name="nome" required autofocus
                                                    style="border: 1px solid red;">

                                            </td>
                                        </tr>
                                        <tr>
                                            <td align="right">
                                                <font color="#666666" face="Arial">Title</font>
                                            </td>
                                            <td><input type="text" name="titulo"></td>
                                        </tr>
                                        <tr>
                                            <td align="right">
                                                <font color="#666666" face="Arial">Shoesize</font>
                                            </td>
                                            <td><input type="number" name="sapato" style="width: 50px;"></td>
                                        </tr>
                                        <tr>
                                            <td align="right">
                                                <font color="#666666" face="Arial">Email (required)</font>
                                            </td>
                                            <td><input type="email" name="email" required
                                                    style="border: 1px solid red;"></td>
                                        </tr>
                                        <tr>
                                            <td align="right">
                                                <font color="#666666" face="Arial">Webpage</font>
                                            </td>
                                            <td><input type="url" name="site"></td>
                                        </tr>
                                        <tr>
                                            <td align="right">
                                                <font color="#666666" face="Arial">Date of Birth</font>
                                            </td>
                                            <td><input type="date" name="nascimento"></td>
                                        </tr>
                                        <tr>
                                            <td align="left">
                                                <font color="#666666" face="Arial">Attractiveness</font>
                                            </td>
                                        </tr>
                                    </table>
                                </td>

                                <td width="25%" valign="top" align="right">
                                    <img src="/Atividades-com-Imagens/opera.png" width="120">
                                </td>

                            </tr>
                        </table>

                    </fieldset>
                </form>

            </td>
        </tr>
    </table>

</body>

</html>
